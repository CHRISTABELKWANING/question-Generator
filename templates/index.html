<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Question Generator</title>
    <link rel="stylesheet" href="../static/style.css">
</head>
<body>
<div class="container">
    <h1>Question Generator</h1>
    <form action="/generate" method="post">
        <div>
            <label for="subject">Subjet</label>
            <input type="text" id="subject" name="subject" placeholder="e.g Science" required>
        </div>
         <div>
            <label for="topic">Topic</label>
            <input type="text" id="topic" name="topic" placeholder="e.g Matter" required>
        </div>
         <div>
            <label for="num_questions">Number of Question</label>
            <input type="number" id="num_questions" name="num_question" min="1" max="20" value="6" required>
        </div>
        <button type="submit">Generate Questions</button>
    </form>

    <!--RESULT-->

        <p class="footer">Built by Kwaning Christabel</p>

</div>
</body>
</html>
